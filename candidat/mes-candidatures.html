<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="page">

<header class="navbar">
  <div class="navbar-inner">
     <a class="brand" href="../index.html">
      <span class="brand-mark" style="width:250px;height:60px;padding:6px 14px;background:transparent;border:none;box-shadow:none;"><img src="../assets/oct-logo.png" alt="Logo OCT" style="width:100%;height:100%;object-fit:contain;"></span>

    <button class="nav-toggle" aria-label="Ouvrir le menu">&#9776;</button>
    <nav class="nav-links">
      <a href="offres.html">Offres de stage</a>

      <a href="suivi.html" class="active">Suivi de candidature</a>
      <a href="rapport.html">Mon rapport de stage</a>
      <a href="connexion.html">Connexion</a>
    </nav>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="section-head">
      <div>
        <h2>Suivre ma candidature</h2>
        <p class="section-sub">Entrez la reference recue lors du depot pour voir l'avancement du dossier.</p>
      </div>
    </div>

    <form class="form-card" id="suivi-form" style="margin-bottom:28px;">
      <div class="field">
        <label for="reference">Reference de candidature</label>
        <input type="text" id="reference" name="reference" placeholder="Ex. CAND-XXXXXXXX-YYY." required>
        <div class="hint"></div>
      </div>
      <button type="submit" class="btn btn-primary">Verifier l'etat de mon dossier</button>
    </form>

    <div id="suivi-result" style="display:none;"></div>
  </div>
</main>

<footer class="footer">
  Office du Commerce de la Tunisie
</footer>
