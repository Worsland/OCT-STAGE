<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion administrateur - Stages OCT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="page">

<header class="navbar">
  <div class="navbar-inner">
    <div class="brand">
      <span class="brand-mark"><img src="../assets/logo.png" alt="Logo OCT"></span>
      <span>Stages OCT<div class="brand-sub">Espace administration</div></span>
    </div>
    <nav class="nav-links">
      <a href="../index.html">Accueil</a>
      <a href="../candidat/offres.html">Espace candidat</a>
    </nav>
  </div>
</header>

<main class="main">
  <div class="container auth-shell">
    <div class="auth-card">
      <div class="section-head" style="display:block;">
        <h2>Connexion administrateur</h2>
        <p class="section-sub">Réserve au personnel administrateur.</p>
      </div>

      <div id="form-alert" class="alert"></div>

      <form class="form-card" id="admin-login-form">
        <div class="field">
          <label for="email">Adresse email</label>
          <input type="email" id="email" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
        <div class="hint" style="margin-top:14px;text-align:center;">
          Demonstration : admin@oct.tn / admin123
        </div>
      </form>
    </div>
  </div>
</main>

<footer class="footer">
  Office du Commerce de la Tunisie
</footer>

<script src="../assets/js/auth.js"></script>
<script src="../assets/js/admin-login.js"></script>
</body>
</html>
